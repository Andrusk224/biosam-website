  <!-- Modal para agrandar imágenes -->
  <div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="imgAmpliada">
  </div>

  <!-- ========== SCRIPTS (MOTORES) ========== -->
  <script>
    /* ------------------------------------
       1. Motor del Menú Móvil (Hamburguesa)
       ------------------------------------ */
    const mobileMenu = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');

    if(mobileMenu && navLinks) {
      mobileMenu.addEventListener('click', () => {
        navLinks.classList.toggle('active');
      });

      navLinks.addEventListener('click', () => {
        navLinks.classList.remove('active');
      });
    }

    /* ------------------------------------
       2. Motor de la Galería de Fotos
       ------------------------------------ */
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("imgAmpliada");
    const imagenesPequeñas = document.querySelectorAll(".photo-item img");
    const botonCerrar = document.querySelector(".close-modal");

    if(modal && modalImg && botonCerrar) {
      imagenesPequeñas.forEach(img => {
        img.onclick = function() {
          modal.style.display = "flex"; 
          modalImg.src = this.src; 
        }
      });

      botonCerrar.onclick = function() {
        modal.style.display = "none";
      }

      modal.onclick = function(evento) {
        if (evento.target !== modalImg) {
          modal.style.display = "none";
        }
      }
    }
  </script>
</body>
