<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="imgAmpliada">
  </div>

  <script>
    // 1. Buscamos la pantalla oscura, la foto ampliada y todas las fotos pequeñas
    const modal = document.getElementById("imageModal");
    const modalImg = document.getElementById("imgAmpliada");
    const imagenesPequeñas = document.querySelectorAll(".photo-item img");
    const botonCerrar = document.querySelector(".close-modal");

    // 2. Le decimos a cada foto pequeña: "Cuando te hagan clic, abre la pantalla oscura y muestra tu imagen"
    imagenesPequeñas.forEach(img => {
      img.onclick = function() {
        modal.style.display = "flex"; // Muestra la pantalla oscura
        modalImg.src = this.src; // Copia la foto pequeña a la grande
      }
    });

    // 3. Cuando hagamos clic en la "X", ocultamos la pantalla oscura
    botonCerrar.onclick = function() {
      modal.style.display = "none";
    }

    // 4. (Opcional) Si la gente hace clic afuera de la foto, también se cierra
    modal.onclick = function(evento) {
      if (evento.target !== modalImg) {
        modal.style.display = "none";
      }
    }
  </script>
